<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitCast — Дашборд</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NOISE GRADIENT BACKGROUND -->
  <div class="noise-bg">
    <div class="noise-bg__wave1"></div>
    <div class="noise-bg__wave2"></div>
    <div class="noise-bg__noise"></div>
  </div>

  <!-- BURGER КНОПКА (плаваючий елемент 1) -->
  <div class="burger" id="burgerBtn">
    <div class="burger__line"></div>
    <div class="burger__line"></div>
    <div class="burger__line"></div>
  </div>

  <!-- ЛОГОТИП (плаваючий елемент 2) -->
  <div class="dashboard-logo">FitCast</div>

  <!-- SIDEBAR (плаваючий елемент 3) -->
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__link">Головна</a>
      <a href="dashboard.html" class="sidebar__link active">Дашборд</a>
      <a href="history.html" class="sidebar__link">Історія тренувань</a>
      <a href="add-workout.html" class="sidebar__link">Додати тренування</a>
      <a href="profile.html" class="sidebar__link">Редагувати профіль</a>
      <div class="sidebar__divider"></div>
      <a href="about.html" class="sidebar__link">Про FitCast</a>
      <a href="login.html" class="sidebar__link">Вийти з акаунту</a>
    </nav>
  </aside>

  <!-- ОСНОВНИЙ КОНТЕНТ -->
  <main class="dashboard-page">

    <h1 class="dashboard__greeting" id="dashboardGreeting">Вітаю</h1>
    <p class="dashboard__subtitle">Розклад на сьогодні:</p>

    <!-- Картки тренувань (рендеряться динамічно з js/dashboard.js) -->
    <div class="workouts-today" id="workoutsToday"></div>

    <!-- React-віджет прогнозу погоди (лаба 4) -->
    <div id="weatherWidgetRoot"></div>

  </main>

  <!-- Зовнішні скрипти (лаба 3) -->
  <script src="js/sidebar.js" defer></script>
  <script src="js/user-data.js" defer></script>
  <script src="js/workouts-data.js" defer></script>
  <script src="js/dashboard.js" defer></script>

  <!-- React + Babel через CDN (лаба 4) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- React Router v5 (лаба 6: переадресація засобами React) -->
  <script crossorigin src="https://unpkg.com/react-router-dom@5.3.4/umd/react-router-dom.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Налаштування погоди (Лаба 4) -->
  <script src="js/weather-config.js"></script>
  <script src="js/weather-mock.js"></script>
  <script src="js/weather-api.js"></script>

  <!-- JSX-компоненти (Babel транспілює в браузері) -->
  <script type="text/babel" data-presets="react" src="js/weather-widget.jsx"></script>

</body>
</html>
