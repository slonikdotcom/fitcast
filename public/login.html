<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitCast — Вхід</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NOISE GRADIENT BACKGROUND -->
  <div class="noise-bg">
    <div class="noise-bg__wave1"></div>
    <div class="noise-bg__wave2"></div>
    <div class="noise-bg__noise"></div>
  </div>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-card__logo">FITCAST</div>
      <div class="auth-card__title">Вхід в акаунт</div>

      <form class="form" action="#" method="POST">

        <div class="form__group">
          <label class="form__label" for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="example@mail.com" required />
        </div>

        <div class="form__group">
          <label class="form__label" for="password">Пароль</label>
          <input type="password" id="password" name="password" placeholder="Ваш пароль" required />
        </div>

        <!-- input type="checkbox" -->
        <div class="form__group" style="flex-direction: row; align-items: center; gap: 10px;">
          <input type="checkbox" id="remember" name="remember" style="width: auto; padding: 0;" />
          <label class="form__label" for="remember" style="margin: 0;">Запам'ятати мене</label>
        </div>

        <button type="submit" class="form__btn">Увійти</button>

      </form>

      <p class="form__switch">
        Ще не маєте акаунту? <a href="register.html">Зареєструватись</a>
      </p>

    </div>
  </div>

  <!-- Зовнішні скрипти (лаба 3) -->
  <script src="js/validation.js" defer></script>
  <script src="js/auth.js" defer></script>

</body>
</html>
